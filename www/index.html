<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f4f7fb">
    <title>CC 工具箱</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <button class="back-button" id="backButton" type="button" aria-label="返回" title="返回">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="topbar-text">
            <p class="eyebrow" id="topbarEyebrow">Personal Toolbox</p>
            <h1 id="topbarTitle">CC 工具箱</h1>
          </div>
        </div>
      </header>

      <div id="routerOutlet"></div>
    </main>

    <script>window.CCToolbox = { tools: [], register(tool) { this.tools.push(tool); } };</script>
    <script src="lib/webdav.js"></script>
    <script src="tools/sync-notes.js"></script>
    <script src="tools/speed-test.js"></script>
    <script src="tools/cloud-backup.js"></script>
    <script src="app.js"></script>
  </body>
</html>
